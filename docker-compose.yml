services:
  postgres:
    image: postgres:17.6
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - app
    restart: unless-stopped

  apiidentity:
    build:
      context: .
      dockerfile: InitialAspireProject.ApiIdentity/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__identitydb: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=identitydb"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  apicore:
    build:
      context: .
      dockerfile: InitialAspireProject.ApiCore/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__coredb: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=coredb"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: InitialAspireProject.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__cacheredis: "redis:6379,password=${REDIS_PASSWORD}"
      services__apiidentity__http__0: "http://apiidentity:8080"
      services__apicore__http__0: "http://apicore:8080"
    ports:
      - "${WEB_PORT:-80}:8080"
    depends_on:
      - apiidentity
      - apicore
      - redis
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge

volumes:
  postgres-data:
    driver: local
