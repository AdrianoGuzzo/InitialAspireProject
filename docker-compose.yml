services:
  dashboard:
    image: mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest
    ports:
      - "18888:18888"
      - "18889:18889"
    environment:
      DASHBOARD__FRONTEND__AUTHMODE: "BrowserToken"
      DASHBOARD__FRONTEND__BROWSERTOKEN: ${DASHBOARD_TOKEN}
      DASHBOARD__OTLP__AUTHMODE: "Unsecured"
      ASPNETCORE_URLS: "http://+:18888;http://+:18889"
    networks:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:17.6
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - app
    restart: unless-stopped

  apiidentity:
    build:
      context: .
      dockerfile: InitialAspireProject.ApiIdentity/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__identitydb: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=identitydb"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__UseSsl: ${SMTP_USE_SSL:-false}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-noreply@aspire.local}
      Smtp__FromName: ${SMTP_FROM_NAME:-Initial Aspire Project}
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      App__BaseUrl: ${APP_BASE_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "apiidentity"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
    volumes:
      - apiidentity-keys:/app/dataprotection-keys
    depends_on:
      - dashboard
      - postgres
    networks:
      - app
    restart: unless-stopped

  apicore:
    build:
      context: .
      dockerfile: InitialAspireProject.ApiCore/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__coredb: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=coredb"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "apicore"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
    volumes:
      - apicore-keys:/app/dataprotection-keys
    depends_on:
      dashboard:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: InitialAspireProject.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__cacheredis: "redis:6379,password=${REDIS_PASSWORD}"
      services__apiidentity__http__0: "http://apiidentity:8080"
      services__apicore__http__0: "http://apicore:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "web"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
    ports:
      - "${WEB_PORT:-80}:8080"
    volumes:
      - web-keys:/app/dataprotection-keys
    depends_on:
      - dashboard
      - apiidentity
      - apicore
      - redis
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  web-keys:
    driver: local
  apiidentity-keys:
    driver: local
  apicore-keys:
    driver: local
